<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORBITA.market — Tempo orbital sob demanda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── Tokens ── */
    :root {
      --bg:       #050c18;
      --bg2:      #07101f;
      --panel:    #0c1a2e;
      --panel2:   #112240;
      --border:   rgba(100,160,255,.07);
      --border2:  rgba(100,160,255,.14);
      --text:     #cdd9f5;
      --text2:    #8aabcc;
      --text3:    #4a6a8a;
      --accent:   #22d3f8;
      --adim:     rgba(34,211,248,.12);
      --aglow:    rgba(34,211,248,.22);
      --ok:       #34d399; --okdim: rgba(52,211,153,.13);
      --warn:     #fbbf24; --warndim: rgba(251,191,36,.13);
      --info:     #60a5fa; --infodim: rgba(96,165,250,.13);
      --done:     #34d399; --donedim: rgba(52,211,153,.13);
      --stop:     #f87171; --stopdim: rgba(248,113,113,.13);
      --r:  8px; --rsm: 5px; --rlg: 14px;
      --shadow:   0 8px 32px rgba(0,0,0,.5);
      --dsys:     'Syne', sans-serif;
      --dbod:     'DM Sans', sans-serif;
      --dmono:    'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--dbod);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }
    button { cursor: pointer; font-family: var(--dbod); border: none; background: none; }

    /* ── Background texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(34,211,248,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,211,248,.018) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* ── Screen ── */
    .scr {
      position: relative; z-index: 1;
      min-height: 100vh;
      animation: fadeUp .28s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Layout ── */
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ── TopBar ── */
    .tb {
      position: sticky; top: 0; z-index: 200;
      background: rgba(5,12,24,.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }
    .tb__in {
      display: flex; align-items: center; gap: 28px;
      height: 58px; max-width: 1200px; margin: 0 auto; padding: 0 24px;
    }
    .brand {
      display: flex; align-items: center; gap: 9px;
      color: var(--text); flex-shrink: 0;
    }
    .brand__mark {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--adim); border: 1.5px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--accent);
      box-shadow: 0 0 14px var(--aglow);
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 14px var(--aglow); }
      50%      { box-shadow: 0 0 26px var(--aglow), 0 0 48px rgba(34,211,248,.08); }
    }
    .brand__name { font-family: var(--dsys); font-weight: 700; font-size: 17px; letter-spacing: -.02em; }
    .brand__tld  { color: var(--accent); }
    .nav { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav__item {
      padding: 6px 14px; border-radius: var(--rsm);
      color: var(--text2); font-size: 13.5px; font-weight: 500;
      transition: color .15s, background .15s;
    }
    .nav__item:hover  { color: var(--text); background: rgba(255,255,255,.05); }
    .nav__item.active { color: var(--text); background: var(--adim); }
    .tb__right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .iconbtn {
      width: 34px; height: 34px; border-radius: var(--rsm);
      border: 1px solid var(--border2);
      color: var(--text2); font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s;
    }
    .iconbtn:hover { border-color: var(--accent); color: var(--accent); }
    .account {
      display: flex; align-items: center; gap: 9px;
      border: 1px solid var(--border2); border-radius: var(--rsm);
      padding: 4px 10px 4px 4px; color: var(--text);
      transition: border-color .15s;
    }
    .account:hover { border-color: var(--accent); }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: var(--adim); border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--dmono); font-size: 10px; color: var(--accent);
    }
    .avatar--xs { width: 20px; height: 20px; font-size: 8px; border-width: 1px; }
    .account__name { font-size: 12px; font-weight: 600; line-height: 1.2; }
    .account__role { font-size: 10.5px; color: var(--text3); line-height: 1.2; }
    .tb__tag { font-size: 12px; color: var(--text3); margin-left: auto; }

    /* ── Placeholder ── */
    .ph {
      width: 100%; background: var(--panel);
      border: 1px solid var(--border); border-radius: var(--r);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .ph::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -45deg, transparent, transparent 8px,
        rgba(100,160,255,.035) 8px, rgba(100,160,255,.035) 9px
      );
    }
    .ph__lbl {
      font-family: var(--dmono); font-size: 11px; color: var(--text3);
      text-align: center; padding: 8px; position: relative; z-index: 1;
    }
    .ph--round { border-radius: 50%; }

    /* ── Satellite image (category-tinted card hero) ── */
    .sat-img {
      width: 100%; height: 148px; border-radius: 0;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .sat-img__bg {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .sat-img__orb {
      position: absolute;
      border-radius: 50%;
      border: 1px solid;
      opacity: .18;
    }
    .sat-img__icon {
      position: relative; z-index: 1;
      font-size: 28px; opacity: .55;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 7px; padding: 0 18px; height: 38px; border-radius: var(--rsm);
      font-size: 13.5px; font-weight: 600; white-space: nowrap;
      transition: all .15s; cursor: pointer;
    }
    .btn--primary { background: var(--accent); color: #030a14; }
    .btn--primary:hover { background: #4de8ff; box-shadow: 0 0 22px var(--aglow); }
    .btn--ghost {
      background: transparent; color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn--ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn--full { width: 100%; }
    .btn--sm { height: 30px; padding: 0 14px; font-size: 12.5px; }

    /* ── Fields ── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field__lbl {
      font-size: 11.5px; font-weight: 600; color: var(--text2);
      letter-spacing: .04em; text-transform: uppercase;
    }
    .field__req { color: var(--accent); margin-left: 2px; }
    .inp {
      min-height: 40px; background: var(--panel); border: 1px solid var(--border2);
      border-radius: var(--rsm); padding: 0 12px; color: var(--text3);
      font-family: var(--dbod); font-size: 14px;
      display: flex; align-items: center; transition: border-color .15s;
    }
    .inp:hover { border-color: rgba(100,160,255,.25); }
    .inp--area { align-items: flex-start; padding: 10px 12px; min-height: 100px; }
    .inp--select { justify-content: space-between; cursor: pointer; }
    .inp--select:hover { border-color: var(--accent); }
    .inp__chev { color: var(--text3); font-size: 12px; }
    .field__hint { font-size: 11.5px; color: var(--text3); }

    /* ── Chips ── */
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 32px;
      background: var(--panel); border: 1px solid var(--border2); border-radius: 999px;
      color: var(--text2); font-size: 13px; font-weight: 500;
      transition: all .15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.active { background: var(--adim); border-color: var(--accent); color: var(--accent); }
    .chip__cnt {
      background: var(--bg); border-radius: 999px;
      padding: 1px 6px; font-size: 11px; font-family: var(--dmono);
    }
    .chip.active .chip__cnt { background: rgba(34,211,248,.18); }

    /* ── Status ── */
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 500; white-space: nowrap;
    }
    .pill__dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .pill--warn { background: var(--warndim); color: var(--warn); }
    .pill--warn .pill__dot { background: var(--warn); }
    .pill--ok   { background: var(--okdim);   color: var(--ok);   }
    .pill--ok   .pill__dot { background: var(--ok); }
    .pill--info { background: var(--infodim); color: var(--info); }
    .pill--info .pill__dot { background: var(--info); }
    .pill--done { background: var(--donedim); color: var(--done); }
    .pill--done .pill__dot { background: var(--done); }
    .pill--stop { background: var(--stopdim); color: var(--stop); }
    .pill--stop .pill__dot { background: var(--stop); }

    /* ── Section head ── */
    .sechead { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
    .kicker { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
    .sechead__title { font-family: var(--dsys); font-weight: 700; font-size: 22px; letter-spacing: -.02em; }

    /* ── Breadcrumbs ── */
    .crumbs { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text3); margin-bottom: 24px; }
    .crumbs__sep { color: var(--text3); }
    .crumbs__link { color: var(--text2); font-size: 12.5px; padding: 0; transition: color .15s; }
    .crumbs__link:hover { color: var(--accent); }
    .crumbs__cur { color: var(--text); }

    /* ── Tags ── */
    .tag {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: var(--rsm);
      background: var(--panel2); border: 1px solid var(--border2);
      font-size: 12px; color: var(--text2);
    }

    /* ── Link ── */
    .lnk { background: none; border: none; color: var(--accent); font-size: 13px; font-family: var(--dbod); padding: 0; }
    .lnk:hover { opacity: .8; }

    /* ── Check ── */
    .chk { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); cursor: pointer; }
    .chk__box { width: 16px; height: 16px; border: 1px solid var(--border2); border-radius: 4px; background: var(--panel); flex-shrink: 0; display: block; }

    /* ────────────────────────────────────────────────
       LOGIN SCREEN
    ──────────────────────────────────────────────── */
    .scr-login { display: flex; flex-direction: column; }
    .login-grid {
      display: grid; grid-template-columns: 1fr 480px; flex: 1;
      min-height: calc(100vh - 58px);
    }
    .login-aside {
      position: relative; overflow: hidden;
      background: radial-gradient(ellipse at 50% 0%, #0d2340 0%, var(--panel) 70%);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }

    /* SVG orbital hero */
    .login-orbital {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .orbital-ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(34,211,248,.12);
      animation: spin linear infinite;
    }
    .orbital-ring::after {
      content: ''; position: absolute;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); top: -4px; left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 12px var(--accent);
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .orbital-core {
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle, rgba(34,211,248,.3) 0%, rgba(34,211,248,.05) 70%);
      border: 1.5px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--accent);
      box-shadow: 0 0 40px var(--aglow), 0 0 80px rgba(34,211,248,.06);
      position: relative; z-index: 1;
    }

    .login-aside__copy {
      padding: 32px 40px 36px;
      background: linear-gradient(to top, var(--panel) 50%, transparent);
    }
    .login-aside__title { font-family: var(--dsys); font-weight: 800; font-size: 26px; letter-spacing: -.03em; line-height: 1.2; margin-bottom: 10px; }
    .login-aside__sub  { font-size: 13.5px; color: var(--text2); margin-bottom: 18px; line-height: 1.6; }
    .login-pts { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .login-pts li { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 10px; }
    .login-pts li span { color: var(--accent); }

    .login-fwrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 48px; background: var(--bg2);
    }
    .login-card { width: 100%; max-width: 380px; }
    .login-tabs {
      display: flex; background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--rsm); padding: 3px; margin-bottom: 24px;
    }
    .login-tab {
      flex: 1; height: 34px; border-radius: 4px;
      color: var(--text2); font-size: 13.5px; font-weight: 500; transition: all .15s;
    }
    .login-tab.active { background: var(--panel2); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,.3); }
    .login-form { display: flex; flex-direction: column; gap: 15px; }
    .login-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .login-row { display: flex; align-items: center; justify-content: space-between; }
    .login-or { display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 12px; }
    .login-or::before, .login-or::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .login-fine { font-size: 11.5px; color: var(--text3); text-align: center; line-height: 1.5; }
    .login-switch { margin-top: 16px; font-size: 13px; color: var(--text3); text-align: center; }

    /* ────────────────────────────────────────────────
       HOME SCREEN
    ──────────────────────────────────────────────── */
    .home-hero {
      background: linear-gradient(180deg, var(--panel) 0%, transparent 100%);
      border-bottom: 1px solid var(--border); padding: 32px 0 24px;
    }
    .home-search {
      display: flex; align-items: center; gap: 12px;
      background: var(--panel2); border: 1px solid var(--border2); border-radius: var(--r);
      padding: 10px 16px; margin-top: 14px;
      transition: border-color .15s, box-shadow .15s;
    }
    .home-search:hover {
      border-color: rgba(34,211,248,.28);
      box-shadow: 0 0 0 3px rgba(34,211,248,.04);
    }
    .home-search__icon { font-size: 18px; color: var(--text3); }
    .home-search__ph { flex: 1; color: var(--text3); font-size: 14px; }
    .home-body { padding-top: 26px; padding-bottom: 48px; }
    .home-filters {
      display: flex; align-items: center; gap: 12px; margin-bottom: 22px; flex-wrap: wrap;
    }
    .home-filters__lbl { font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); flex-shrink: 0; }
    .home-filters__chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .home-filters__more { display: flex; gap: 12px; margin-left: auto; }
    .hsub { font-size: 12.5px; color: var(--text3); cursor: pointer; transition: color .15s; }
    .hsub:hover { color: var(--text2); }
    .hsub--clear { color: var(--accent); }
    .home-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

    /* ── Satellite card ── */
    .sat-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: var(--rlg);
      overflow: hidden; text-align: left;
      display: flex; flex-direction: column;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      position: relative;
    }
    .sat-card:hover {
      transform: translateY(-3px);
      border-color: var(--border2);
      box-shadow: 0 12px 40px rgba(0,0,0,.45), 0 0 0 1px rgba(34,211,248,.1);
    }
    .sat-card__cat {
      position: absolute; top: 12px; left: 12px;
      background: rgba(5,12,24,.82); backdrop-filter: blur(8px);
      border: 1px solid var(--border2); border-radius: 999px;
      padding: 2px 10px; font-size: 11px; font-weight: 600;
      color: var(--accent); letter-spacing: .04em;
    }
    .sat-card__body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .sat-card__name { font-family: var(--dsys); font-weight: 700; font-size: 16px; letter-spacing: -.01em; margin-bottom: 5px; }
    .sat-card__owner { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); margin-bottom: 9px; }
    .sat-card__meta { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); margin-bottom: 12px; }
    .dot { color: var(--text3); }
    .sat-card__foot {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border);
    }
    .sat-card__price { font-family: var(--dsys); font-weight: 700; font-size: 17px; }
    .sat-card__price small { font-size: 11px; font-family: var(--dbod); font-weight: 400; color: var(--text3); margin-left: 2px; }
    .sat-card__cta { font-size: 12.5px; color: var(--accent); font-weight: 600; }

    /* ────────────────────────────────────────────────
       DETAIL SCREEN
    ──────────────────────────────────────────────── */
    .detail-body { padding-top: 26px; padding-bottom: 48px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 340px; gap: 32px; align-items: start; }
    .detail-thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; margin-bottom: 32px; }
    .detail-thumbs .ph { border-radius: var(--rsm); }
    .spec-table { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 28px; }
    .spec-row { display: grid; grid-template-columns: 150px 1fr; border-bottom: 1px solid var(--border); padding: 11px 16px; gap: 12px; }
    .spec-row:last-child { border-bottom: none; }
    .spec-row:nth-child(even) { background: var(--panel); }
    .spec-row__k { font-size: 11.5px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; align-self: center; }
    .spec-row__v { font-size: 13.5px; color: var(--text); align-self: center; }
    .detail-prose { margin-bottom: 24px; }
    .detail-prose p { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 14px; }
    .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .detail-side { position: sticky; top: 78px; }
    .price-card {
      background: var(--panel); border: 1px solid var(--border2); border-radius: var(--rlg);
      padding: 22px; display: flex; flex-direction: column; gap: 14px;
    }
    .price-card__cat { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); }
    .price-card__name { font-family: var(--dsys); font-size: 20px; font-weight: 700; letter-spacing: -.02em; line-height: 1.2; }
    .price-card__owner { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text2); }
    .price-card__pricebox {
      display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap;
      padding: 14px; background: var(--panel2); border-radius: var(--r); border: 1px solid var(--border);
    }
    .price-card__from { font-size: 12px; color: var(--text3); }
    .price-card__val { font-family: var(--dsys); font-size: 26px; font-weight: 800; letter-spacing: -.03em; }
    .price-card__unit { font-size: 12px; color: var(--text3); }
    .price-card__rows { display: flex; flex-direction: column; }
    .price-card__row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .price-card__row:last-child { border-bottom: none; }
    .price-card__row span:first-child { color: var(--text2); }
    .ok-text { color: var(--ok); font-weight: 500; }
    .price-card__fine { font-size: 11.5px; color: var(--text3); text-align: center; line-height: 1.5; }
    .price-card__btns { display: flex; flex-direction: column; gap: 8px; }

    /* ────────────────────────────────────────────────
       CHECKOUT SCREEN
    ──────────────────────────────────────────────── */
    .checkout-body { padding-top: 26px; padding-bottom: 48px; }
    .checkout-grid { display: grid; grid-template-columns: 1fr 320px; gap: 28px; align-items: start; }
    .form-block { background: var(--panel); border: 1px solid var(--border); border-radius: var(--rlg); padding: 22px; margin-bottom: 18px; }
    .form-block__head { font-family: var(--dsys); font-weight: 600; font-size: 15px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .form-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-pair:last-child { margin-bottom: 0; }
    .checkout-actions { display: flex; justify-content: space-between; align-items: center; padding-top: 4px; }
    .summary-card { background: var(--panel); border: 1px solid var(--border2); border-radius: var(--rlg); padding: 20px; position: sticky; top: 78px; }
    .summary-card__sat { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .summary-card__name { font-family: var(--dsys); font-weight: 700; font-size: 14px; margin-bottom: 3px; }
    .summary-card__owner { font-size: 12px; color: var(--text2); }
    .summary-card__rows { display: flex; flex-direction: column; }
    .summary-card__row { display: flex; justify-content: space-between; padding: 9px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
    .summary-card__row:last-child { border-bottom: none; }
    .summary-card__row span:first-child { color: var(--text2); }
    .summary-card__total { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; margin-top: 4px; border-top: 1px solid var(--border2); font-weight: 600; font-size: 14px; }
    .summary-card__totalval { font-family: var(--dsys); font-size: 20px; font-weight: 800; }
    .summary-card__fine { font-size: 11.5px; color: var(--text3); margin-top: 10px; line-height: 1.5; }

    /* ────────────────────────────────────────────────
       DASHBOARD SCREEN
    ──────────────────────────────────────────────── */
    .dash-body { padding-top: 26px; padding-bottom: 48px; }
    .dash-flash {
      display: flex; align-items: center; gap: 10px;
      background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.28); border-radius: var(--r);
      padding: 12px 16px; font-size: 13.5px; color: var(--ok); margin-bottom: 22px;
      animation: flashIn .4s ease;
    }
    @keyframes flashIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    .dash-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 26px; }
    .dash-stat { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r); padding: 20px 20px 16px; display: flex; flex-direction: column; gap: 4px; }
    .dash-stat__v { font-family: var(--dsys); font-size: 34px; font-weight: 800; letter-spacing: -.04em; line-height: 1; }
    .dash-stat__k { font-size: 12px; color: var(--text3); }
    .dash-tablewrap { background: var(--panel); border: 1px solid var(--border); border-radius: var(--rlg); overflow: hidden; }
    .dash-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .dash-tabs { display: flex; gap: 4px; }
    .dash-tab { padding: 4px 14px; border-radius: var(--rsm); font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .15s; }
    .dash-tab.active { background: var(--adim); color: var(--accent); }
    .dash-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    .dash-table thead th {
      background: var(--bg2); padding: 10px 16px; text-align: left;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
      color: var(--text3); border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .dash-table tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    .dash-table tbody tr:last-child { border-bottom: none; }
    .dash-table tbody tr:hover { background: var(--panel2); }
    .dash-table tbody tr.is-new { background: rgba(34,211,248,.04); }
    .dash-table td { padding: 14px 16px; vertical-align: middle; }
    .mono { font-family: var(--dmono); font-size: 12.5px; color: var(--text2); }
    .dash-sat { display: flex; align-items: center; gap: 10px; }
    .dash-sat__name { font-weight: 600; font-size: 13.5px; line-height: 1.3; }
    .dash-sat__owner { font-size: 11.5px; color: var(--text3); }
    .dash-obj { color: var(--text2); max-width: 220px; }
    .dash-rowcta { border: 1px solid var(--border); border-radius: var(--rsm); padding: 4px 10px; color: var(--text3); font-size: 15px; transition: all .15s; }
    .dash-rowcta:hover { border-color: var(--border2); color: var(--text); }

    /* ── Responsive ── */
    @media (max-width: 1080px) {
      .home-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
      .detail-side { position: static; }
      .checkout-grid { grid-template-columns: 1fr; }
      .dash-stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .login-grid { grid-template-columns: 1fr; }
      .login-aside { display: none; }
      .home-grid { grid-template-columns: 1fr; }
      .nav { display: none; }
      .dash-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ── Data ── */
    const SATS = [
      { id:"goes",  name:"GOES-Atlas 7",  owner:"Meteora Space",    cat:"Clima",        orbit:"GEO · 35.786 km", cap:"Imageamento multiespectral · 16 bandas", res:"0,5 km / pixel",  revisit:"Contínuo (geoestacionário)", price:"US$ 1.240", unit:"/ órbita",     clr:"#22d3f8" },
      { id:"orion", name:"LinkSat Orion", owner:"Vega Networks",    cat:"Comunicação",  orbit:"LEO · 550 km",    cap:"Downlink banda Ka · 1,2 Gbps",           res:"—",               revisit:"8 passagens / dia",          price:"US$ 880",   unit:"/ hora",       clr:"#60a5fa" },
      { id:"terra", name:"TerraScan 12",  owner:"GeoOrbit Labs",    cat:"Topografia",   orbit:"SSO · 620 km",    cap:"Radar SAR banda-X",                       res:"1,0 m / pixel",   revisit:"11 dias",                   price:"US$ 1.560", unit:"/ aquisição",  clr:"#34d399" },
      { id:"hel",   name:"Helios Watch",  owner:"Solaris Dynamics", cat:"Clima",        orbit:"SSO · 705 km",    cap:"Sondagem atmosférica · IR",               res:"2,0 km / pixel",  revisit:"2x / dia",                  price:"US$ 640",   unit:"/ órbita",     clr:"#22d3f8" },
      { id:"relay", name:"RelaySat C2",   owner:"NovaLink",         cat:"Comunicação",  orbit:"MEO · 8.000 km",  cap:"Relay banda-S · baixa latência",          res:"—",               revisit:"Janelas de 40 min",          price:"US$ 1.020", unit:"/ hora",       clr:"#60a5fa" },
      { id:"carto", name:"CartoSat HR",   owner:"Andes Imaging",    cat:"Topografia",   orbit:"SSO · 505 km",    cap:"Óptico pancromático",                     res:"0,3 m / pixel",   revisit:"5 dias",                    price:"US$ 2.100", unit:"/ aquisição",  clr:"#34d399" },
    ];

    const STATUS_MAP = {
      analise:  { label:"Em análise", cls:"warn" },
      aprovado: { label:"Aprovado",   cls:"ok"   },
      agendado: { label:"Agendado",   cls:"info" },
      concluido:{ label:"Concluído",  cls:"done" },
      recusado: { label:"Recusado",   cls:"stop" },
    };

    /* ── Shared primitives ── */
    function TopBar({ active, onNav, onLogout, minimal }) {
      return (
        <header className="tb">
          <div className="tb__in">
            <button className="brand" onClick={() => onNav && onNav(minimal ? "login" : "home")}>
              <span className="brand__mark">◍</span>
              <span className="brand__name">ORBITA<span className="brand__tld">.market</span></span>
            </button>
            {!minimal && (
              <>
                <nav className="nav">
                  <button className={"nav__item" + (["home","details","checkout"].includes(active) ? " active" : "")} onClick={() => onNav("home")}>Catálogo</button>
                  <button className={"nav__item" + (active === "dashboard" ? " active" : "")} onClick={() => onNav("dashboard")}>Meus Aluguéis</button>
                  <button className="nav__item">Suporte</button>
                </nav>
                <div className="tb__right">
                  <button className="iconbtn">◇</button>
                  <button className="account" onClick={onLogout}>
                    <span className="avatar">UF</span>
                    <span>
                      <div className="account__name">Univ. Federal</div>
                      <div className="account__role">Pesquisa</div>
                    </span>
                  </button>
                </div>
              </>
            )}
            {minimal && <span className="tb__tag">Marketplace de tempo orbital sob demanda</span>}
          </div>
        </header>
      );
    }

    function SatImg({ sat }) {
      return (
        <div className="sat-img">
          <div className="sat-img__bg" style={{ background: `radial-gradient(ellipse at 50% 30%, ${sat.clr}18 0%, #0c1a2e 75%)` }}>
            <div className="sat-img__orb" style={{ width:110, height:110, borderColor: sat.clr }} />
            <div className="sat-img__orb" style={{ width:72, height:72, borderColor: sat.clr, opacity:.12 }} />
            <span className="sat-img__icon" style={{ color: sat.clr }}>◍</span>
          </div>
        </div>
      );
    }

    function Ph({ h, w, label, className }) {
      return (
        <div className={"ph" + (className ? " " + className : "")} style={{ height: h, width: w }}>
          <span className="ph__lbl">{label}</span>
        </div>
      );
    }

    function Btn({ children, variant = "primary", full, sm, onClick, icon }) {
      return (
        <button type="button" onClick={onClick}
          className={"btn btn--" + variant + (full ? " btn--full" : "") + (sm ? " btn--sm" : "")}>
          {icon && <span>{icon}</span>}{children}
        </button>
      );
    }

    function Field({ label, placeholder, type = "input", hint, required, value }) {
      return (
        <label className="field">
          <span className="field__lbl">{label}{required && <span className="field__req">*</span>}</span>
          {type === "area"   ? <div className="inp inp--area">{value || placeholder}</div>
           : type === "select" ? <div className="inp inp--select"><span>{value || placeholder}</span><span className="inp__chev">▾</span></div>
           : <div className="inp">{value || placeholder}</div>}
          {hint && <span className="field__hint">{hint}</span>}
        </label>
      );
    }

    function Chip({ children, active, onClick, count }) {
      return (
        <button type="button" className={"chip" + (active ? " active" : "")} onClick={onClick}>
          {children}{count != null && <span className="chip__cnt">{count}</span>}
        </button>
      );
    }

    function StatusPill({ status }) {
      const s = STATUS_MAP[status] || STATUS_MAP.analise;
      return <span className={"pill pill--" + s.cls}><span className="pill__dot" />{s.label}</span>;
    }

    function SectionHead({ kicker, title, right }) {
      return (
        <div className="sechead">
          <div>
            {kicker && <div className="kicker">{kicker}</div>}
            <h2 className="sechead__title">{title}</h2>
          </div>
          {right}
        </div>
      );
    }

    function Crumbs({ items }) {
      return (
        <nav className="crumbs">
          {items.map((it, i) => (
            <React.Fragment key={i}>
              {i > 0 && <span className="crumbs__sep">/</span>}
              {it.onClick
                ? <button className="crumbs__link" onClick={it.onClick}>{it.label}</button>
                : <span className="crumbs__cur">{it.label}</span>}
            </React.Fragment>
          ))}
        </nav>
      );
    }

    /* ── Screen 1: Login ── */
    function LoginScreen({ onLogin }) {
      const [tab, setTab] = useState("entrar");
      return (
        <div className="scr scr-login">
          <TopBar minimal onNav={() => {}} />
          <div className="login-grid">
            <aside className="login-aside">
              <div className="login-orbital">
                <div className="orbital-ring" style={{ width:280, height:280, animationDuration:"28s" }} />
                <div className="orbital-ring" style={{ width:190, height:190, animationDuration:"18s", animationDirection:"reverse", borderStyle:"dashed", opacity:.08 }} />
                <div className="orbital-core">◍</div>
              </div>
              <div className="login-aside__copy">
                <div className="kicker">Space Economy · B2C</div>
                <h1 className="login-aside__title">Tempo de satélite sob demanda para pesquisa.</h1>
                <p className="login-aside__sub">Reserve janelas de observação de clima, comunicação e topografia direto com as operadoras.</p>
                <ul className="login-pts">
                  <li><span>◍</span> Catálogo de satélites verificados</li>
                  <li><span>◍</span> Contratação por órbita, hora ou aquisição</li>
                  <li><span>◍</span> Acompanhamento de missões em tempo real</li>
                </ul>
              </div>
            </aside>

            <section className="login-fwrap">
              <div className="login-card">
                <div className="login-tabs">
                  <button className={"login-tab" + (tab === "entrar" ? " active" : "")} onClick={() => setTab("entrar")}>Entrar</button>
                  <button className={"login-tab" + (tab === "criar"  ? " active" : "")} onClick={() => setTab("criar")}>Criar conta</button>
                </div>

                {tab === "entrar" ? (
                  <div className="login-form">
                    <Field label="E-mail institucional" placeholder="nome@universidade.edu" required />
                    <Field label="Senha" placeholder="••••••••" required />
                    <div className="login-row">
                      <label className="chk"><span className="chk__box" />Manter conectado</label>
                      <button className="lnk">Esqueci a senha</button>
                    </div>
                    <Btn full onClick={onLogin}>Entrar na plataforma</Btn>
                    <div className="login-or"><span>ou</span></div>
                    <Btn full variant="ghost" onClick={onLogin} icon="◎">Acessar com SSO institucional</Btn>
                  </div>
                ) : (
                  <div className="login-form">
                    <div className="login-pair">
                      <Field label="Nome da instituição" placeholder="Universidade / Empresa" required />
                      <Field label="Tipo" type="select" placeholder="Universidade" required />
                    </div>
                    <Field label="E-mail institucional" placeholder="nome@universidade.edu" required />
                    <div className="login-pair">
                      <Field label="Senha" placeholder="••••••••" required />
                      <Field label="Confirmar senha" placeholder="••••••••" required />
                    </div>
                    <label className="chk"><span className="chk__box" />Aceito os termos de uso e a política de dados orbitais</label>
                    <Btn full onClick={onLogin}>Criar conta institucional</Btn>
                    <p className="login-fine">Contas passam por verificação da instituição antes da primeira reserva.</p>
                  </div>
                )}
              </div>
              <p className="login-switch">
                {tab === "entrar" ? "Novo por aqui? " : "Já tem cadastro? "}
                <button className="lnk" onClick={() => setTab(tab === "entrar" ? "criar" : "entrar")}>
                  {tab === "entrar" ? "Criar conta para instituições" : "Fazer login"}
                </button>
              </p>
            </section>
          </div>
        </div>
      );
    }

    /* ── Screen 2: Home / Catálogo ── */
    function HomeScreen({ onNav, onOpen }) {
      const filters = ["Todos","Clima","Comunicação","Topografia"];
      const [active, setActive] = useState("Todos");
      const counts = { Todos: SATS.length, Clima: 2, Comunicação: 2, Topografia: 2 };
      const list = active === "Todos" ? SATS : SATS.filter(s => s.cat === active);

      return (
        <div className="scr scr-home">
          <TopBar active="home" onNav={onNav} onLogout={() => onNav("login")} />

          <div className="home-hero">
            <div className="wrap">
              <SectionHead kicker={"Catálogo · " + SATS.length + " satélites disponíveis"} title="Encontre tempo orbital sob demanda" />
              <div className="home-search">
                <span className="home-search__icon">⌕</span>
                <span className="home-search__ph">Buscar por satélite, operadora, sensor ou região…</span>
                <Btn sm>Buscar</Btn>
              </div>
            </div>
          </div>

          <div className="wrap home-body">
            <div className="home-filters">
              <span className="home-filters__lbl">Filtrar por capacidade</span>
              <div className="home-filters__chips">
                {filters.map(f => (
                  <Chip key={f} active={active === f} onClick={() => setActive(f)} count={counts[f]}>{f}</Chip>
                ))}
              </div>
              <div className="home-filters__more">
                <span className="hsub">Órbita ▾</span>
                <span className="hsub">Resolução ▾</span>
                <span className="hsub">Preço ▾</span>
                <span className="hsub hsub--clear">Limpar</span>
              </div>
            </div>

            <div className="home-grid">
              {list.map(s => (
                <button key={s.id} className="sat-card" onClick={() => onOpen(s)}>
                  <SatImg sat={s} />
                  <span className="sat-card__cat">{s.cat}</span>
                  <div className="sat-card__body">
                    <h3 className="sat-card__name">{s.name}</h3>
                    <div className="sat-card__owner">
                      <span className="avatar avatar--xs" style={{ borderColor: s.clr, color: s.clr }}>◍</span>
                      {s.owner}
                    </div>
                    <div className="sat-card__meta">
                      <span>{s.orbit.split(" · ")[0]}</span>
                      <span className="dot">·</span>
                      <span>{s.res !== "—" ? s.res : s.cap.split(" · ")[0]}</span>
                    </div>
                    <div className="sat-card__foot">
                      <span className="sat-card__price">{s.price}<small>{s.unit}</small></span>
                      <span className="sat-card__cta">Ver detalhes →</span>
                    </div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ── Screen 3: Detail ── */
    function DetailScreen({ sat, onNav, onRequest }) {
      const s = sat || SATS[0];
      const specs = [
        ["Capacidade", s.cap],
        ["Órbita",     s.orbit],
        ["Resolução",  s.res],
        ["Revisita",   s.revisit],
        ["Operadora",  s.owner],
        ["Categoria",  s.cat],
      ];
      return (
        <div className="scr scr-detail">
          <TopBar active="details" onNav={onNav} onLogout={() => onNav("login")} />
          <div className="wrap detail-body">
            <Crumbs items={[
              { label:"Catálogo",  onClick: () => onNav("home") },
              { label: s.cat,      onClick: () => onNav("home") },
              { label: s.name }
            ]} />

            <div className="detail-grid">
              <div>
                <Ph label="[ IMG · equipamento / satélite — vista principal ]" h="360px" />
                <div className="detail-thumbs">
                  <Ph label="[ vista 2 ]"   h="70px" />
                  <Ph label="[ sensor ]"    h="70px" />
                  <Ph label="[ cobertura ]" h="70px" />
                  <Ph label="[ +4 ]"        h="70px" />
                </div>

                <SectionHead kicker="Ficha técnica" title="Especificações" />
                <div className="spec-table">
                  {specs.map(([k, v]) => (
                    <div className="spec-row" key={k}>
                      <span className="spec-row__k">{k}</span>
                      <span className="spec-row__v">{v}</span>
                    </div>
                  ))}
                </div>

                <SectionHead kicker="Sobre" title="Descrição do serviço" />
                <div className="detail-prose">
                  <p>Janela de acesso ao {s.name}, operado pela {s.owner}. Indicado para coletas de {s.cat.toLowerCase()} com entrega de dados brutos e calibrados via portal seguro da plataforma.</p>
                  <div className="detail-tags">
                    <span className="tag">Dados brutos</span>
                    <span className="tag">API de download</span>
                    <span className="tag">Suporte técnico</span>
                    <span className="tag">Licença pesquisa</span>
                  </div>
                </div>
              </div>

              <aside className="detail-side">
                <div className="price-card">
                  <div className="price-card__cat">{s.cat}</div>
                  <h1 className="price-card__name">{s.name}</h1>
                  <div className="price-card__owner">
                    <span className="avatar avatar--xs" style={{ borderColor: s.clr, color: s.clr }}>◍</span>
                    {s.owner}
                  </div>
                  <div className="price-card__pricebox">
                    <span className="price-card__from">a partir de</span>
                    <span className="price-card__val">{s.price}</span>
                    <span className="price-card__unit">{s.unit}</span>
                  </div>
                  <div className="price-card__rows">
                    <div className="price-card__row"><span>Disponibilidade</span><span className="ok-text">Próx. janela em 3 dias</span></div>
                    <div className="price-card__row"><span>Tempo mínimo</span><span>1 órbita (~90 min)</span></div>
                    <div className="price-card__row"><span>Entrega de dados</span><span>24–48 h</span></div>
                  </div>
                  <div className="price-card__btns">
                    <Btn full onClick={() => onRequest(s)}>Solicitar uso →</Btn>
                    <Btn full variant="ghost">Falar com a operadora</Btn>
                  </div>
                  <p className="price-card__fine">Sem cobrança até a confirmação da janela pela operadora.</p>
                </div>
              </aside>
            </div>
          </div>
        </div>
      );
    }

    /* ── Screen 4: Checkout ── */
    function CheckoutScreen({ sat, onNav, onConfirm }) {
      const s = sat || SATS[0];
      return (
        <div className="scr scr-checkout">
          <TopBar active="checkout" onNav={onNav} onLogout={() => onNav("login")} />
          <div className="wrap checkout-body">
            <Crumbs items={[
              { label:"Catálogo",    onClick: () => onNav("home")    },
              { label: s.name,      onClick: () => onNav("details") },
              { label:"Solicitação" }
            ]} />

            <div className="checkout-grid">
              <div>
                <SectionHead kicker="Etapa 1 de 1 · solicitação" title="Definir janela de uso" />

                <div className="form-block">
                  <div className="form-block__head">Período do aluguel</div>
                  <div className="form-pair">
                    <Field label="Data de início" type="select" placeholder="dd / mm / aaaa" required hint="Sujeito à confirmação da janela orbital" />
                    <Field label="Tempo necessário" type="select" placeholder="Selecione a duração" required hint={"Cobrado " + s.unit.replace("/", "por")} />
                  </div>
                  <div className="form-pair">
                    <Field label="Faixa horária (UTC)" type="select" placeholder="Qualquer passagem" />
                    <Field label="Prioridade" type="select" placeholder="Padrão" />
                  </div>
                </div>

                <div className="form-block">
                  <div className="form-block__head">Objetivo da missão</div>
                  <Field label="Descreva o objetivo da coleta" type="area"
                    placeholder="Ex.: monitorar cobertura de nuvens sobre a Amazônia para validação de modelo climático…"
                    required hint="Ajuda a operadora a configurar o sensor e validar o uso." />
                  <br />
                  <Field label="Anexar protocolo de pesquisa (opcional)" placeholder="↥  arraste um arquivo ou clique para enviar" />
                </div>

                <div className="checkout-actions">
                  <Btn variant="ghost" onClick={() => onNav("details")}>← Voltar</Btn>
                  <Btn onClick={onConfirm}>Confirmar solicitação</Btn>
                </div>
              </div>

              <aside>
                <div className="summary-card">
                  <div className="summary-card__sat">
                    <Ph label="[ IMG ]" h="56px" w="56px" />
                    <div>
                      <div className="summary-card__name">{s.name}</div>
                      <div className="summary-card__owner">{s.owner}</div>
                    </div>
                  </div>
                  <div className="summary-card__rows">
                    <div className="summary-card__row"><span>Categoria</span><span>{s.cat}</span></div>
                    <div className="summary-card__row"><span>Órbita</span><span>{s.orbit.split(" · ")[0]}</span></div>
                    <div className="summary-card__row"><span>Preço base</span><span>{s.price} {s.unit}</span></div>
                    <div className="summary-card__row"><span>Taxa de plataforma</span><span>US$ 120</span></div>
                  </div>
                  <div className="summary-card__total">
                    <span>Estimativa</span>
                    <span className="summary-card__totalval">US$ 1.360</span>
                  </div>
                  <p className="summary-card__fine">Valor final confirmado após aprovação da janela pela operadora.</p>
                </div>
              </aside>
            </div>
          </div>
        </div>
      );
    }

    /* ── Screen 5: Dashboard ── */
    function DashboardScreen({ onNav, flash }) {
      const BASE = [
        { id:"#ORB-2284", sat:"TerraScan 12",  owner:"GeoOrbit Labs",    date:"08 jun 2026", dur:"1 aquisição", status:"aprovado",  obj:"Modelo de elevação — Andes"      },
        { id:"#ORB-2270", sat:"LinkSat Orion",  owner:"Vega Networks",    date:"30 mai 2026", dur:"2 horas",     status:"agendado",  obj:"Teste de downlink banda Ka"       },
        { id:"#ORB-2251", sat:"Helios Watch",   owner:"Solaris Dynamics", date:"21 mai 2026", dur:"4 órbitas",   status:"concluido", obj:"Sondagem atmosférica IR"          },
        { id:"#ORB-2240", sat:"CartoSat HR",    owner:"Andes Imaging",    date:"14 mai 2026", dur:"1 aquisição", status:"recusado",  obj:"Imageamento urbano 0,3 m"         },
      ];
      const rows  = flash ? [flash, ...BASE] : BASE;
      const stats = [
        ["Em análise",           flash ? 2 : 1],
        ["Aprovados",            1],
        ["Em órbita / agendado", 1],
        ["Concluídos",           1],
      ];

      return (
        <div className="scr scr-dash">
          <TopBar active="dashboard" onNav={onNav} onLogout={() => onNav("login")} />
          <div className="wrap dash-body">
            <SectionHead
              kicker="Painel da instituição"
              title="Meus aluguéis"
              right={<Btn onClick={() => onNav("home")} icon="＋">Nova solicitação</Btn>}
            />

            {flash && (
              <div className="dash-flash">
                ✓ Solicitação <strong>{flash.id}</strong> enviada — aguardando análise da operadora.
              </div>
            )}

            <div className="dash-stats">
              {stats.map(([k, v]) => (
                <div className="dash-stat" key={k}>
                  <span className="dash-stat__v">{v}</span>
                  <span className="dash-stat__k">{k}</span>
                </div>
              ))}
            </div>

            <div className="dash-tablewrap">
              <div className="dash-toolbar">
                <div className="dash-tabs">
                  <span className="dash-tab active">Todos</span>
                  <span className="dash-tab">Em andamento</span>
                  <span className="dash-tab">Concluídos</span>
                </div>
                <span className="hsub">Ordenar: mais recentes ▾</span>
              </div>
              <table className="dash-table">
                <thead>
                  <tr>
                    <th>Pedido</th>
                    <th>Satélite</th>
                    <th>Objetivo da missão</th>
                    <th>Início</th>
                    <th>Duração</th>
                    <th>Status</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r, i) => (
                    <tr key={i} className={flash && i === 0 ? "is-new" : ""}>
                      <td className="mono">{r.id}</td>
                      <td>
                        <div className="dash-sat">
                          <span className="avatar avatar--xs">◍</span>
                          <div>
                            <div className="dash-sat__name">{r.sat}</div>
                            <div className="dash-sat__owner">{r.owner}</div>
                          </div>
                        </div>
                      </td>
                      <td className="dash-obj">{r.obj}</td>
                      <td className="mono">{r.date}</td>
                      <td>{r.dur}</td>
                      <td><StatusPill status={r.status} /></td>
                      <td><button className="dash-rowcta">⋯</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    /* ── App root ── */
    function App() {
      const [screen, setScreen]     = useState("login");
      const [selSat, setSelSat]     = useState(null);
      const [flash,  setFlash]      = useState(null);
      const [orbIdx, setOrbIdx]     = useState(1);

      const go = (s) => {
        setScreen(s);
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const handleLogin   = () => go("home");
      const handleOpen    = (sat) => { setSelSat(sat); go("details"); };
      const handleRequest = (sat) => { setSelSat(sat); go("checkout"); };
      const handleConfirm = () => {
        const id = "#ORB-" + (2291 + Math.floor(Math.random() * 10));
        setFlash({
          id,
          sat:    selSat ? selSat.name  : "GOES-Atlas 7",
          owner:  selSat ? selSat.owner : "Meteora Space",
          date:   "12 jun 2026",
          dur:    "3 órbitas",
          status: "analise",
          obj:    "Missão de pesquisa",
        });
        go("dashboard");
      };

      const nav = (s) => {
        if (s === "login") { setFlash(null); }
        go(s);
      };

      if (screen === "login")     return <LoginScreen onLogin={handleLogin} />;
      if (screen === "home")      return <HomeScreen onNav={nav} onOpen={handleOpen} />;
      if (screen === "details")   return <DetailScreen sat={selSat} onNav={nav} onRequest={handleRequest} />;
      if (screen === "checkout")  return <CheckoutScreen sat={selSat} onNav={nav} onConfirm={handleConfirm} />;
      if (screen === "dashboard") return <DashboardScreen onNav={nav} flash={flash} />;
      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
